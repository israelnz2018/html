<div class="max-w-3xl mx-auto p-4">
  <label class="block mb-2 text-sm font-medium text-gray-700">Escolha seu arquivo (.xlsx):</label>
  <input type="file" id="fileInput" accept=".xlsx"
    class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50" />

  <div id="colunasContainer" class="mt-4 hidden">
    <p class="font-semibold mb-2">Títulos das colunas:</p>
    <ul id="colunasList" class="list-disc ml-5"></ul>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
    <div>
      <label class="block mb-1 font-medium text-gray-700">Coluna Y</label>
      <select id="coluna_y" class="w-full border rounded p-2"></select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Colunas X</label>
      <select id="colunas_x" class="w-full border rounded p-2" multiple></select>
    </div>
  </div>
</div>

<div class="space-y-4 max-w-3xl mx-auto p-4">
  <div class="text-center">
    <button id="btnEnviarAnalise" class="bg-blue-600 text-white rounded px-6 py-2 hover:bg-blue-700">
      Enviar Análise
    </button>
  </div>

  <div class="flex flex-col md:flex-row md:items-center md:space-x-2 space-y-2 md:space-y-0">
    <label class="font-semibold">Pergunta do aluno:</label>
    <input id="perguntaAluno" type="text" class="flex-1 border rounded p-2" placeholder="Digite sua pergunta..." />
    <button id="btnPerguntar" class="bg-green-600 text-white rounded px-4 py-2 hover:bg-green-700">
      Perguntar
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Análise Estatística</h2>
      <div id="conteudoAnalise" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>

    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Gráfico Isolado</h2>
      <div id="conteudoGrafico" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
document.getElementById('fileInput').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[firstSheetName];
    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

    const colunas = jsonData[0] || [];

    const colunasList = document.getElementById('colunasList');
    colunasList.innerHTML = '';
    colunas.forEach(titulo => {
      const li = document.createElement('li');
      li.textContent = titulo;
      colunasList.appendChild(li);
    });

    document.getElementById('colunasContainer').classList.remove('hidden');

    const ySelect = document.getElementById('coluna_y');
    const xSelect = document.getElementById('colunas_x');
    ySelect.innerHTML = '';
    xSelect.innerHTML = '';
    colunas.forEach(titulo => {
      const optY = document.createElement('option');
      optY.value = titulo;
      optY.textContent = titulo;
      ySelect.appendChild(optY);

      const optX = document.createElement('option');
      optX.value = titulo;
      optX.textContent = titulo;
      xSelect.appendChild(optX);
    });
  };
  reader.readAsArrayBuffer(file);
});
</script>
