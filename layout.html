<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Learning by Working</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    nav button { font-size: 0.85rem; }
    nav ul li a { font-size: 0.85rem; }
    nav ul li ul {
      display: none; position: absolute; background-color: #1f2937;
      border: 1px solid #374151; border-radius: 0.25rem; z-index: 10;
    }
    nav ul li ul li { position: relative; }
    nav ul li ul li a {
      display: block; padding: 0.25rem 1rem;
      font-size: 0.80rem !important;
    }
    nav ul li ul ul {
      display: none; position: absolute; left: 100%; top: 0; margin-left: 0.25rem;
      background-color: #374151; border: 1px solid #4b5563; border-radius: 0.25rem;
    }
    nav ul li.show > ul, nav ul li ul li.show > ul { display: block; }

    .spinner { display: none; }
    .pulse-loader { display: none; }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    .btn-container { text-align: center; margin-top: 1rem; }

    #btnEnviarAnalise span,
    #btnPerguntar span { display: inline-block; vertical-align: middle; }
    .spinner, #spinner-perguntar { vertical-align: middle; }

    .pulse-animate { animation: pulse 1s infinite ease-in-out; }
  </style>
</head>
<body>

<nav style="background-color: #13294b; color: white;" class="p-2 flex justify-between items-center">
  <div class="flex items-center space-x-2">
    <img src="https://i.postimg.cc/s2JKTF5r/logo-LBW-2.png" alt="Logo" style="height: 40px; width: auto;">
  </div>
  <ul class="flex space-x-2 items-center"></ul>
  <div id="usuario-info" class="flex items-center space-x-2"></div>
</nav>

<div class="max-w-6xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
    <div>
      <label class="block mb-1 font-medium text-gray-700">Escolha seu arquivo (.xlsx):</label>
      <input type="file" id="fileInput" accept=".xlsx"
        class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50" />
    </div>
    <div>
      <label class="block mb-1 font-medium text-gray-700">Aba da Planilha</label>
      <select id="aba_planilha" class="w-full border rounded p-2"></select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
    <div id="previewColunas" class="md:col-span-2 border rounded bg-gray-100 p-2 text-sm overflow-x-auto"></div>
    <div id="boxAnalise" class="border rounded bg-white shadow p-4 min-h-[100%]">
      <p class="text-sm text-gray-500">Escolha uma ferramenta para começar.</p>
    </div>
  </div>

  <div class="btn-container">
    <button id="btnEnviarAnalise" class="bg-blue-600 text-white rounded px-6 py-2 hover:bg-blue-700 flex items-center justify-center">
      <span>Enviar Análise</span>
    </button>
  </div>
</div>

<div class="space-y-4 max-w-6xl mx-auto p-4">
  <div class="flex flex-col md:flex-row md:items-center md:space-x-2 space-y-2 md:space-y-0">
    <label class="font-semibold">Pergunta (apenas estatística):</label>
    <input id="perguntaAluno" type="text" class="flex-1 border rounded p-2" placeholder="Digite sua pergunta..." />
    <button id="btnPerguntar" class="bg-green-600 text-white rounded px-4 py-2 hover:bg-green-700 flex items-center justify-center">
      <span>Perguntar</span>
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Análise Estatística</h2>
      <div id="conteudoAnalise" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>

    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Gráfico</h2>
      <div id="conteudoGrafico" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>
  </div>
</div>

<!-- Painel de Personalização -->
<div id="painelPersonalizacao" style="display:none; border:1px solid #ccc; padding:10px; margin-top:10px;">
  <h3>Personalização do Gráfico</h3>
  <div id="opcoesPersonalizacao" style="display:none;">
    <label>Título do Gráfico: <input type="text" id="tituloGrafico" /></label><br>
    <label>Título Eixo X: <input type="text" id="tituloEixoX" /></label><br>
    <label>Título Eixo Y: <input type="text" id="tituloEixoY" /></label><br>
    <label>Cor do Gráfico: <input type="color" id="corGrafico" /></label><br>
    <label>Tamanho da Fonte: <input type="number" id="tamanhoFonte" /></label><br>
    <label>Inclinação X: <input type="number" id="inclinacaoX" /></label><br>
    <button id="btnAplicarPersonalizacao" style="background:green; color:white; padding:5px 10px; margin-top:10px;">
      Aplicar Alterações
    </button>
  </div>
</div>

<script>
  function iniciarAnimacaoBotao(btnId) {
    const botao = document.getElementById(btnId);
    try {
      if (botao) {
        botao.classList.add("pulse-animate");
        setTimeout(() => {
          botao.classList.remove("pulse-animate");
        }, 2000);
      }
    } catch (error) {
      console.log("Erro ignorado:", error);
    }
  }

  document.getElementById("btnEnviarAnalise").addEventListener("click", () => {
    iniciarAnimacaoBotao("btnEnviarAnalise");
    setTimeout(() => {
      console.log('Gráfico gerado ou análise processada');
    }, 1000);
  });

  document.getElementById("btnPerguntar").addEventListener("click", () => {
    iniciarAnimacaoBotao("btnPerguntar");
  });
</script>

</body>
</html>
