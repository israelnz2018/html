<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Learning by Working</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    nav button {
      font-size: 0.60rem;
    }

    nav ul li a {
      font-size: 0.60rem;
    }

    nav ul li ul {
      display: none;
      position: absolute;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.25rem;
      z-index: 10;
    }

    nav ul li ul li {
      position: relative;
    }

    nav ul li ul ul {
      display: none;
      position: absolute;
      left: 100%;
      top: 0;
      margin-left: 0.25rem;
      background-color: #374151;
      border: 1px solid #4b5563;
      border-radius: 0.25rem;
    }

    nav ul li ul li a {
      display: block;
      padding: 0.25rem 1rem;
    }

    nav ul li.show > ul {
      display: block;
    }

    nav ul li ul li.show > ul {
      display: block;
    }
  </style>
</head>
<body>

<nav class="bg-gray-800 text-white p-2 flex justify-between items-center">
  <div class="text-lg font-semibold">Learning by Working</div>
  <ul class="flex space-x-2 items-center"></ul>
  <div id="usuario-info" class="flex items-center space-x-2"></div>
</nav>

<div class="max-w-6xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
    <div>
      <label class="block mb-1 font-medium text-gray-700">Escolha seu arquivo (.xlsx):</label>
      <input type="file" id="fileInput" accept=".xlsx"
        class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50" />
    </div>
    <div>
      <label class="block mb-1 font-medium text-gray-700">Aba da Planilha</label>
      <select id="aba_planilha" class="w-full border rounded p-2"></select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
    <div id="previewColunas" class="md:col-span-2 border rounded bg-gray-100 p-2 text-sm overflow-x-auto">
      <table class="min-w-full border">
        <thead>
          <tr>
            <th class="border px-2 py-1 bg-gray-200">Coluna 1</th>
            <th class="border px-2 py-1 bg-gray-200">Coluna 2</th>
            <th class="border px-2 py-1 bg-gray-200">Coluna 3</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="border px-2 py-1">Exemplo 1</td>
            <td class="border px-2 py-1">Exemplo 2</td>
            <td class="border px-2 py-1">Exemplo 3</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="boxAnalise" class="border rounded bg-white shadow p-4 min-h-[100%]">
      <p class="text-sm text-gray-500">Escolha uma ferramenta para começar.</p>
    </div>
  </div>

  <div class="text-center mt-4">
    <button id="btnEnviarAnalise" class="bg-blue-600 text-white rounded px-6 py-2 hover:bg-blue-700">
      Enviar Análise
    </button>
  </div>
</div>

<div class="space-y-4 max-w-6xl mx-auto p-4">
  <div class="flex flex-col md:flex-row md:items-center md:space-x-2 space-y-2 md:space-y-0">
    <label class="font-semibold">Pergunta do aluno:</label>
    <input id="perguntaAluno" type="text" class="flex-1 border rounded p-2" placeholder="Digite sua pergunta..." />
    <button id="btnPerguntar" class="bg-green-600 text-white rounded px-4 py-2 hover:bg-green-700">
      Perguntar
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Análise Estatística</h2>
      <div id="conteudoAnalise" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>
    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Gráfico Isolado</h2>
      <div id="conteudoGrafico" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>
  </div>
</div>

<script>
let workbookGlobal = null;

function ativarLayout() {
  console.log("JS do layout ativado");

  const fileEl = document.getElementById('fileInput');
  const abaEl = document.getElementById('aba_planilha');

  if (fileEl) {
    fileEl.addEventListener('change', function(event) {
      console.log("Upload detectado");
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        workbookGlobal = XLSX.read(data, { type: 'array' });

        abaEl.innerHTML = '';

        workbookGlobal.SheetNames.forEach((name, index) => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          abaEl.appendChild(opt);
          if (index === 0) {
            abaEl.value = name;
          }
        });

        console.log("Dropdown preenchido. Primeira aba:", abaEl.value);
        mostrarPreview(abaEl.value);
      };
      reader.readAsArrayBuffer(file);
    });
  } else {
    console.warn("⚠ fileInput não encontrado no DOM ao ativar layout.");
  }

  if (abaEl) {
    abaEl.addEventListener('change', function() {
      const aba = this.value;
      console.log("Aba selecionada:", aba);
      mostrarPreview(aba);
    });
  } else {
    console.warn("⚠ aba_planilha não encontrado no DOM ao ativar layout.");
  }
}

function mostrarPreview(aba) {
  if (!workbookGlobal) return;
  const worksheet = workbookGlobal.Sheets[aba];
  const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

  const colunas = jsonData[0] || [];
  const primeiraLinha = jsonData[1] || [];

  const previewDiv = document.getElementById('previewColunas');
  previewDiv.innerHTML = '';

  const table = document.createElement('table');
  table.className = 'min-w-full border';

  const trHeader = document.createElement('tr');
  colunas.forEach(t => {
    const th = document.createElement('th');
    th.className = 'border px-2 py-1 bg-gray-200';
    th.textContent = t;
    trHeader.appendChild(th);
  });
  table.appendChild(trHeader);

  const trData = document.createElement('tr');
  colunas.forEach((_, i) => {
    const td = document.createElement('td');
    td.className = 'border px-2 py-1';
    td.textContent = primeiraLinha[i] !== undefined ? primeiraLinha[i] : '';
    trData.appendChild(td);
  });
  table.appendChild(trData);

  previewDiv.appendChild(table);
}
</script>

  
<script>
ativarLayout();
</script>

<script src="menu.js"></script>
</body>
</html>
