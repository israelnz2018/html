<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Learning by Working</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    nav button { font-size: 0.85rem; }
    nav ul li a { font-size: 0.85rem; }
    nav ul li ul {
      display: none; position: absolute; background-color: #1f2937;
      border: 1px solid #374151; border-radius: 0.25rem; z-index: 10;
    }
    nav ul li ul li { position: relative; }
    nav ul li ul li a {
      display: block; padding: 0.25rem 1rem;
      font-size: 0.80rem !important; /* força tamanho igual */
    }
    nav ul li ul ul {
      display: none; position: absolute; left: 100%; top: 0; margin-left: 0.25rem;
      background-color: #374151; border: 1px solid #4b5563; border-radius: 0.25rem;
    }
    nav ul li.show > ul, nav ul li ul li.show > ul { display: block; }

    /* Spinner bolinhas pulando */
    .spinner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .spinner div {
      width: 8px;
      height: 8px;
      margin: 3px;
      background-color: white;
      border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }
    .spinner div:nth-child(2) { animation-delay: 0.2s; }
    .spinner div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      to { transform: translateY(-8px); opacity: 0.7; }
    }

    /* Centralizar botão enviar análise */
    .btn-container {
      text-align: center;
      margin-top: 1rem;
    }

    /* Espaço entre texto e spinner */
    #btnEnviarAnalise span,
    #btnPerguntar span {
      display: inline-block;
      vertical-align: middle;
    }
    .spinner, #spinner-perguntar {
      vertical-align: middle;
    }
  </style>
</head>
<body>

<nav style="background-color: #13294b; color: white;" class="p-2 flex justify-between items-center">
  <div class="flex items-center space-x-2">
    <img src="https://i.postimg.cc/s2JKTF5r/logo-LBW-2.png" alt="Logo" style="height: 40px; width: auto;">
  </div>
  <ul class="flex space-x-2 items-center"></ul>
  <div id="usuario-info" class="flex items-center space-x-2"></div>
</nav>

<div class="max-w-6xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
    <div>
      <label class="block mb-1 font-medium text-gray-700">Escolha seu arquivo (.xlsx):</label>
      <input type="file" id="fileInput" accept=".xlsx"
        class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50" />
    </div>
    <div>
      <label class="block mb-1 font-medium text-gray-700">Aba da Planilha</label>
      <select id="aba_planilha" class="w-full border rounded p-2"></select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
    <div id="previewColunas" class="md:col-span-2 border rounded bg-gray-100 p-2 text-sm overflow-x-auto"></div>
    <div id="boxAnalise" class="border rounded bg-white shadow p-4 min-h-[100%]">
      <p class="text-sm text-gray-500">Escolha uma ferramenta para começar.</p>
    </div>
  </div>

  <div class="btn-container">
    <button id="btnEnviarAnalise" class="bg-blue-600 text-white rounded px-6 py-2 hover:bg-blue-700 flex items-center justify-center">
      <span>Enviar Análise</span>
      <span id="spinner-enviar" class="spinner ml-2 hidden">
        <div></div><div></div><div></div>
      </span>
    </button>
  </div>
  
  <div class="btn-container mt-4">
    <button id="btnPerguntar" class="bg-green-600 text-white rounded px-4 py-2 hover:bg-green-700 flex items-center justify-center">
      <span>Perguntar</span>
      <span id="spinner-perguntar" class="ml-2 hidden">
        <span class="pulse-loader"></span>
      </span>
    </button>
  </div>
</div>

<script>
  // Função para enviar análise
  document.getElementById("btnEnviarAnalise").addEventListener("click", function() {
    const spinner = document.getElementById("spinner-enviar");
    spinner.classList.remove("hidden");  // Exibe o spinner

    setTimeout(function() {
      spinner.classList.add("hidden");  // Esconde o spinner após 3 segundos
    }, 3000);  // 3000ms = 3 segundos
  });

  // Função para fazer pergunta ao agente IA
  document.getElementById("btnPerguntar").addEventListener("click", function() {
    const spinner = document.getElementById("spinner-perguntar");
    spinner.classList.remove("hidden");  // Exibe o spinner

    setTimeout(function() {
      spinner.classList.add("hidden");  // Esconde o spinner após 3 segundos
    }, 3000);  // 3000ms = 3 segundos
  });
</script>

</body>
</html>
