<script>
  let slimSelectInstance = null;

  function verificarArquivo() {
    const arquivo = document.getElementById('arquivo').files[0];  
    const erro = document.getElementById('erro-arquivo');
    if (!arquivo) return;

    const tipoAceito = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';

    if (arquivo.type !== tipoAceito && !arquivo.name.endsWith('.xlsx')) {
      erro.textContent = "❌ Formato não aceito. Envie apenas arquivos .xlsx do Excel.";
      document.getElementById('arquivo').value = '';
    } else {
      erro.textContent = '';
    }
  }

  async function validarLogin() {
    const email = document.getElementById('email-login').value.trim();
    const senha = document.getElementById('senha-login').value.trim();
    const msg = document.getElementById('mensagem-login');
    const spinner = document.getElementById('spinner');

    if (!email || !senha) {
      msg.textContent = "❌ Preencha e-mail e senha.";
      msg.style.color = "red";
      return;
    }

    spinner.style.display = "inline-block";

    try {
      const resposta = await fetch("https://primary-production-1d53.up.railway.app/webhook/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, senha })
      });

      const dados = await resposta.json();
      console.log("🔍 Resposta do login:", dados);

      if (dados?.autorizado) {
        msg.textContent = `✅ Bem-vindo, ${dados.nome}!`;
        msg.style.color = "green";

        ['prompt', 'arquivo','enviar', 'remover', 'ferramenta', 'grafico_tipo', 'coluna_y', 'colunas_x'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.disabled = false;
        });

        document.getElementById('sair').style.display = 'inline-block';

        if (slimSelectInstance) slimSelectInstance.destroy();

        setTimeout(() => {
          slimSelectInstance = new SlimSelect({
            select: '#colunas_x',
            settings: { closeOnSelect: false },
            events: {
              afterChange: info => {
                slimSelectInstance.ordemSelecionada = info.map(item => item.value);
              }
            }
          });
        }, 0);

        sessaoAtiva = true;
        resetarTimer();
      } else {
        msg.textContent = "❌ Acesso negado.";
        msg.style.color = "red";
      }
    } catch (err) {
      msg.textContent = "❌ Erro ao conectar.";
      msg.style.color = "red";
      console.error("❌ Erro:", err);
    } finally {
      spinner.style.display = "none";
    }
  }

  function removerArquivo() {
    const input = document.getElementById('arquivo');
    if (input) input.value = '';
    const erro = document.getElementById('erro-arquivo');
    if (erro) erro.textContent = '';
  }
</script>
