<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Learning by Working</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
    nav button { font-size: 0.85rem; }
    nav ul li a { font-size: 0.85rem; }
    nav ul li ul {
      display: none; position: absolute; background-color: #1f2937;
      border: 1px solid #374151; border-radius: 0.25rem; z-index: 10;
    }
    nav ul li ul li { position: relative; }
    nav ul li ul li a {
      display: block; padding: 0.25rem 1rem;
      font-size: 0.80rem !important; /* força tamanho igual */
    }
    nav ul li ul ul {
      display: none; position: absolute; left: 100%; top: 0; margin-left: 0.25rem;
      background-color: #374151; border: 1px solid #4b5563; border-radius: 0.25rem;
    }
    nav ul li.show > ul, nav ul li ul li.show > ul { display: block; }
  </style>

</head>
<body>


<nav style="background-color: #13294b; color: white;" class="p-2 flex justify-between items-center">
  <div class="flex items-center space-x-2">
    <img src="https://i.postimg.cc/s2JKTF5r/logo-LBW-2.png" alt="Logo" style="height: 40px; width: auto;">
  </div>
  <ul class="flex space-x-2 items-center"></ul>
  <div id="usuario-info" class="flex items-center space-x-2"></div>
</nav>



<div class="max-w-6xl mx-auto p-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
    <div>
      <label class="block mb-1 font-medium text-gray-700">Escolha seu arquivo (.xlsx):</label>
      <input type="file" id="fileInput" accept=".xlsx"
        class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50" />
    </div>
    <div>
      <label class="block mb-1 font-medium text-gray-700">Aba da Planilha</label>
      <select id="aba_planilha" class="w-full border rounded p-2"></select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
    <div id="previewColunas" class="md:col-span-2 border rounded bg-gray-100 p-2 text-sm overflow-x-auto"></div>
    <div id="boxAnalise" class="border rounded bg-white shadow p-4 min-h-[100%]">
      <p class="text-sm text-gray-500">Escolha uma ferramenta para começar.</p>
    </div>
  </div>

  <div class="text-center mt-4">
    <button id="btnEnviarAnalise" class="bg-blue-600 text-white rounded px-6 py-2 hover:bg-blue-700">Enviar Análise</button>
  </div>
</div>

<div class="space-y-4 max-w-6xl mx-auto p-4">
  <div class="flex flex-col md:flex-row md:items-center md:space-x-2 space-y-2 md:space-y-0">
    <label class="font-semibold">Pergunta (apenas estatística):</label>
    <input id="perguntaAluno" type="text" class="flex-1 border rounded p-2" placeholder="Digite sua pergunta..." />
    <button id="btnPerguntar" class="bg-green-600 text-white rounded px-4 py-2 hover:bg-green-700">Perguntar</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Análise Estatística</h2>
      <div id="conteudoAnalise" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto"></div>
    </div>

    <div class="border rounded-lg p-4 bg-white shadow min-h-[300px] flex flex-col">
      <h2 class="font-bold text-lg mb-2 text-center">Gráfico</h2>
      <div id="conteudoGrafico" class="flex-1 p-2 border rounded bg-gray-50 text-sm overflow-y-auto">
        
        <!-- Aqui será inserido o gráfico dinamicamente -->

<!-- Painel Personalização Gráfico -->
<div id="painelPersonalizacao" style="display:none; border:1px solid #ccc; padding:10px; margin:0; width:100%;">
  <button id="togglePersonalizacao" style="font-weight:bold; font-size:0.9rem; padding:4px 8px; margin-bottom:10px;">
    Personalizar Gráfico ▼
  </button>

  <div id="opcoesPersonalizacao" style="display:none; grid-template-columns: repeat(3, 1fr); gap:10px; width:100%;" class="grid">

    <!-- Primeira linha: Título do Gráfico ocupando 100% -->
    <div class="col-span-3">
      <label for="tituloGrafico">Título do Gráfico</label>
      <input type="text" id="tituloGrafico" placeholder="Título do gráfico" style="width:100%; background-color:#fff; border:1px solid #ccc; color:#333;">
    </div>

    <!-- Segunda linha: Título Eixo Y | Título Eixo X (50% cada) -->
    <div class="col-span-3 grid grid-cols-2 gap-2">
      <div>
        <label for="tituloEixoY">Título Eixo Y</label>
        <input type="text" id="tituloEixoY" placeholder="Eixo Y" style="width:100%; background-color:#fff; border:1px solid #ccc; color:#333;">
      </div>

      <div>
        <label for="tituloEixoX">Título Eixo X</label>
        <input type="text" id="tituloEixoX" placeholder="Eixo X" style="width:100%; background-color:#fff; border:1px solid #ccc; color:#333;">
      </div>
    </div>

    <!-- Terceira linha: Cor do Gráfico | Tamanho Fonte | Inclinação X -->
    <div>
      <label for="corGrafico">Cor do Gráfico</label>
      <input type="color" id="corGrafico" value="#000000" style="width:100%;">
    </div>

    <div>
      <label for="tamanhoFonte">Tamanho Fonte</label>
      <input type="number" id="tamanhoFonte" value="12" min="8" max="30" style="width:100%; background-color:#fff; border:1px solid #ccc; color:#333;">
    </div>

    <div>
      <label for="inclinacaoX">Inclinação Eixo X</label>
      <input type="number" id="inclinacaoX" value="0" min="-60" max="60" style="width:100%; background-color:#fff; border:1px solid #ccc; color:#333;">
    </div>

    <!-- Botão Aplicar Alterações ocupando 100% -->
    <div class="col-span-3">
      <button id="btnAplicarPersonalizacao" style="background-color:green; color:white; padding:6px 12px; border-radius:4px; width:auto;">
        Aplicar Alterações
      </button>
    </div>

  </div>
</div>
