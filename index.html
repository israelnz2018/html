<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /> 
  <title>Learning by Working</title> 

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- SlimSelect -->
  <link href="https://cdn.jsdelivr.net/npm/slim-select@2.6.0/dist/slimselect.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/slim-select@2.6.0/dist/slimselect.min.js"></script>

  <!-- XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- LOGIN POPUP FORA DO BLOQUEIO -->
  <div id="login-container"></div>

  <!-- APP BLOQUEADO NO INÍCIO -->
  <div id="app-wrapper" class="opacity-50 pointer-events-none">
    <div class="max-w-6xl mx-auto p-4 space-y-4">
      <div id="app" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const arquivos = [
      "acesso_permissoes.html",
      "layout.html",
      "pokayoke.html"
    ];

    async function carregarArquivos() {
      for (const nome of arquivos) {
        const resposta = await fetch(nome);
        const conteudo = await resposta.text();
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = conteudo;

        Array.from(tempDiv.childNodes).forEach(node => {
          if (node.tagName === "SCRIPT") {
            const script = document.createElement("script");
            script.textContent = node.textContent;
            document.body.appendChild(script);
          } else if (node.tagName === "STYLE") {
            document.head.appendChild(node);
          } else {
            if (nome === "acesso_permissoes.html") {
              document.getElementById("login-container").appendChild(node);
            } else {
              document.getElementById("app").appendChild(node);
            }
          }
        });
      }
    }

    carregarArquivos().then(() => {
      console.log("✅ Layout carregado");
      carregarScriptsNaOrdem([
        { src: "menu.js", msg: "✅ menu.js carregado" },
        { src: "entradadedados.js", msg: "✅ entradadedados.js carregado" },
        { src: "meu_script.js", msg: "✅ meu_script.js carregado" },
        { src: "funcionalidade.js", msg: "✅ funcionalidade.js carregado" }
      ], () => {
        if (typeof gerarMenus === 'function') gerarMenus();
        if (typeof inicializarEventos === 'function') inicializarEventos();
        if (typeof iniciarFuncionalidade === 'function') iniciarFuncionalidade();
      });
    });

    function carregarScriptsNaOrdem(lista, callbackFinal) {
      if (lista.length === 0) {
        callbackFinal();
        return;
      }
      const item = lista.shift();
      const script = document.createElement("script");
      script.src = item.src;
      script.onload = () => {
        console.log(item.msg);
        carregarScriptsNaOrdem(lista, callbackFinal);
      };
      document.body.appendChild(script);
    }
  </script>

</body>
</html>
