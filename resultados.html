<div class="space-y-4">

  <!-- Botão Enviar Análise -->
  <div>
    <button id="btnEnviarAnalise" class="bg-blue-600 text-white rounded px-4 py-2 hover:bg-blue-700">
      Enviar Análise
    </button>
  </div>

  <!-- Pergunta do aluno + botão Perguntar -->
  <div class="flex items-center space-x-2">
    <label class="font-semibold">Pergunta do aluno:</label>
    <input id="perguntaAluno" type="text" class="flex-1 border rounded p-2" placeholder="Digite sua pergunta..." />
    <button id="btnPerguntar" class="bg-green-600 text-white rounded px-3 py-2 hover:bg-green-700">
      Perguntar
    </button>
  </div>

  <!-- Análise Estatística + Gráfico Isolado lado a lado -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Área Análise Estatística -->
    <div id="areaAnalise" class="border rounded p-4 bg-white shadow">
      <h2 class="font-bold text-lg mb-2">Análise Estatística</h2>
      <div id="promptAluno" class="p-2 border rounded bg-gray-50 text-sm mb-2"></div>
      <div id="conteudoAnalise" class="p-2 border rounded bg-gray-50 text-sm"></div>
    </div>

    <!-- Área Gráfico Isolado -->
    <div id="areaGrafico" class="border rounded p-4 bg-white shadow">
      <h2 class="font-bold text-lg mb-2">Gráfico Isolado</h2>
      <div id="conteudoGrafico" class="p-2 border rounded bg-gray-50 text-sm"></div>
    </div>

  </div>

</div>
