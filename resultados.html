<div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
  <!-- Área da análise estatística + gráficos + IA -->
  <div id="areaAnalise" class="border rounded p-2 bg-white">
    <h2 class="font-bold text-lg mb-2">Análise Estatística</h2>
    
    <div class="mb-2">
      <p class="font-semibold">Pergunta do aluno:</p>
      <div id="promptAluno" class="p-2 border rounded bg-gray-50 text-sm"></div>
    </div>

    <div class="mb-2">
      <p class="font-semibold">Resultado da análise:</p>
      <div id="conteudoAnalise" class="p-2 border rounded bg-gray-50 text-sm"></div>
    </div>

    <div class="mb-2">
      <p class="font-semibold">Gráficos da análise:</p>
      <div id="graficosAnalise" class="p-2 border rounded bg-gray-50 text-sm"></div>
    </div>

    <div>
      <p class="font-semibold">Interpretação do agente:</p>
      <div id="conteudoAgente" class="p-2 border rounded bg-gray-50 text-sm"></div>
    </div>
  </div>

  <!-- Área do gráfico isolado -->
  <div id="areaGrafico" class="border rounded p-2 bg-white">
    <h2 class="font-bold text-lg mb-2">Gráfico Isolado</h2>
    <div id="conteudoGrafico"></div>
  </div>
</div>
