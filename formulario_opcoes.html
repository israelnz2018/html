<div class="p-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block mb-1 font-medium text-gray-700">Ferramenta estatística</label>
      <select id="ferramenta" class="w-full border rounded p-1">
        <option value="">Selecione</option>
        <option value="RegressaoLinear">Regressão Linear</option>
        <option value="Anova">ANOVA</option>
        <!-- Você pode adicionar mais opções -->
      </select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Gráfico</label>
      <select id="grafico" class="w-full border rounded p-1">
        <option value="">Selecione</option>
        <option value="Boxplot">Boxplot</option>
        <option value="Dispersao">Dispersão</option>
        <!-- Você pode adicionar mais opções -->
      </select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Coluna Y</label>
      <select id="coluna_y" class="w-full border rounded p-1"></select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-700">Colunas X</label>
      <select id="colunas_x" class="w-full border rounded p-1" multiple></select>
    </div>
  </div>
</div>

<script>
function preencherDropdowns(colunas) {
  const ySelect = document.getElementById('coluna_y');
  const xSelect = document.getElementById('colunas_x');
  ySelect.innerHTML = '';
  xSelect.innerHTML = '';

  colunas.forEach(titulo => {
    const optY = document.createElement('option');
    optY.value = titulo;
    optY.textContent = titulo;
    ySelect.appendChild(optY);

    const optX = document.createElement('option');
    optX.value = titulo;
    optX.textContent = titulo;
    xSelect.appendChild(optX);
  });
}

// Integrar ao upload_botoes.js
document.getElementById('fileInput').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[firstSheetName];
    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

    const colunas = jsonData[0] || [];
    preencherDropdowns(colunas);
  };
  reader.readAsArrayBuffer(file);
});
</script>
