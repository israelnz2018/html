<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Trocar Senha Provisória</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }
    .container h2 {
      margin-bottom: 20px;
    }
    .container input[type="email"],
    .container input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .container button {
      background-color: #28a745;
      color: white;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .container button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔒 Trocar Senha</h2>
    <form id="formTrocarSenha">
      <input type="email" id="email" name="email" placeholder="E-mail" required>

      <input type="password" id="senha_provisoria" name="senha_provisoria" placeholder="Senha provisória" required>

      <input type="password" id="nova_senha" name="nova_senha" placeholder="Nova senha" required>

      <button type="submit">Trocar Senha</button>
    </form>
  </div>

  <script>
    document.getElementById("formTrocarSenha").addEventListener("submit", async function(event){
      event.preventDefault();

      const email = document.getElementById("email").value;
      const senha_provisoria = document.getElementById("senha_provisoria").value;
      const nova_senha = document.getElementById("nova_senha").value;

      const resposta = await fetch("https://primary-production-1d53.up.railway.app/webhook/senhaprovisoria", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: email,
          senha_provisoria: senha_provisoria,
          nova_senha: nova_senha
        })
      });

      const resultado = await resposta.json();
      alert(resultado.mensagem || "Senha alterada com sucesso");
    });
  </script>
